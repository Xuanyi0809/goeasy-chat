<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #00d4aa; --bg: #0a0a0a; --card: #141414; --hover: #1a1a1a; --text: #fff; --gray: #888; --border: #2a2a2a; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: var(--card); padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 18px; font-weight: 600; color: var(--primary); }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .lang-btn { padding: 6px 12px; background: var(--hover); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; cursor: pointer; }
        .lang-btn:hover { background: var(--card); }
        .status { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #f39c12; }
        .dot.on { background: var(--primary); }
        .main { flex: 1; display: flex; flex-direction: column; padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; }
        .screen { text-align: center; padding: 40px 20px; }
        .screen h1 { font-size: 28px; margin-bottom: 10px; color: var(--primary); }
        .screen p { color: var(--gray); margin-bottom: 30px; }
        .form { margin-bottom: 20px; text-align: left; }
        .form label { display: block; margin-bottom: 8px; color: var(--gray); font-size: 14px; }
        .form input { width: 100%; padding: 12px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 16px; }
        .form input:focus { outline: none; border-color: var(--primary); }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .btn1 { background: var(--primary); color: var(--bg); }
        .btn1:hover { opacity: 0.9; }
        .btn2 { background: var(--card); color: var(--text); border: 1px solid var(--border); }
        .btn2:hover { background: var(--hover); }
        .chat { display: none; flex: 1; flex-direction: column; }
        .chat.on { display: flex; }
        .room { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card); border-radius: 8px; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .room-info { display: flex; align-items: center; gap: 10px; }
        .badge { background: var(--primary); color: var(--bg); padding: 4px 12px; border-radius: 12px; font-weight: 600; font-size: 14px; }
        .count { color: var(--gray); font-size: 14px; }
        .room-actions { display: flex; gap: 8px; }
        .share { padding: 8px 16px; background: var(--hover); color: var(--text); border: 1px solid var(--border); border-radius: 6px; font-size: 14px; cursor: pointer; }
        .share:hover { background: var(--card); }
        .msgs { flex: 1; overflow-y: auto; padding: 15px; background: var(--card); border-radius: 8px; min-height: 300px; max-height: 500px; }
        .msg { margin-bottom: 16px; padding: 12px 16px; background: var(--hover); border-radius: 12px; border-left: 3px solid var(--primary); }
        .msg.sys { border-left-color: #f39c12; background: rgba(243,156,18,0.1); text-align: center; }
        .msg-head { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .msg-user { font-weight: 600; color: var(--primary); }
        .msg-time { font-size: 12px; color: var(--gray); }
        .msg-text { line-height: 1.5; word-break: break-word; }
        .input { display: flex; gap: 10px; padding: 15px 0; }
        .input input { flex: 1; padding: 14px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 16px; }
        .input input:focus { outline: none; border-color: var(--primary); }
        .input button { padding: 14px 24px; background: var(--primary); color: var(--bg); border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .input button:hover { opacity: 0.9; }
        .info { background: rgba(0,212,170,0.1); border: 1px solid var(--primary); border-radius: 8px; padding: 12px 15px; margin-bottom: 20px; font-size: 14px; color: var(--primary); text-align: center; }
        .err { background: rgba(231,76,60,0.1); border: 1px solid #e74c3c; border-radius: 8px; padding: 12px 15px; margin-bottom: 20px; font-size: 14px; color: #e74c3c; text-align: center; }
        @media (max-width: 600px) { .main { padding: 15px; } .msgs { min-height: 250px; max-height: 350px; } .room { flex-direction: column; align-items: stretch; } .room-actions { justify-content: center; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">Chat Room</div>
        <div class="header-right">
            <button class="lang-btn" id="langBtn" onclick="toggleLang()">中文</button>
            <div class="status"><div class="dot" id="dot"></div><span id="status">Connecting...</span></div>
        </div>
    </div>
    <div class="main">
        <div class="screen" id="screen">
            <h1 id="title">Free Chat Room</h1>
            <p id="subtitle">Real-time chat without registration</p>
            <div class="info" id="info">Your private chat room</div>
            <div class="err" id="error" style="display:none;"></div>
            <div class="form"><label id="nickLabel">Your Nickname</label><input type="text" id="nick" placeholder="Enter nickname" maxlength="20"></div>
            <div class="form"><label id="roomLabel">Room Name</label><input type="text" id="room" placeholder="Default Room" value="default"></div>
            <button class="btn btn1" id="joinBtn" onclick="join()">Join Chat</button>
            <button class="btn btn2" id="newRoomBtn" onclick="newRoom()">New Room</button>
        </div>
        <div class="chat" id="chat">
            <div class="room">
                <div class="room-info">
                    <span class="badge" id="badge">default</span>
                    <span class="count"><span id="count">1</span> <span id="onlineText">online</span></span>
                </div>
                <div class="room-actions">
                    <button class="share" id="shareBtn" onclick="share()">Share</button>
                </div>
            </div>
            <div class="msgs" id="msgs"><div class="msg sys"><div class="msg-text" id="welcomeMsg">Welcome to chat!</div></div></div>
            <div class="input"><input type="text" id="msg" placeholder="Type message..." maxlength="500"><button id="sendBtn" onclick="send()">Send</button></div>
        </div>
    </div>
    <script src="https://cdn.goeasy.io/goeasy-2.2.1.min.js"></script>
    <script>
        // GoEasy AppKey
        const APP_KEY = 'BC-7334176896d2476ba9d7fe273c9334b5';
        
        // Language data
        const lang = {
            zh: {
                title: '免费聊天室',
                subtitle: '无需注册的实时聊天',
                info: '您的私人聊天室',
                nickLabel: '您的昵称',
                nickPlaceholder: '请输入昵称',
                roomLabel: '房间名称',
                roomPlaceholder: '默认房间',
                joinBtn: '加入聊天',
                newRoomBtn: '创建新房间',
                welcomeMsg: '欢迎来到聊天室！',
                onlineText: '人在线',
                shareBtn: '分享',
                sendBtn: '发送',
                msgPlaceholder: '输入消息...',
                joinText: '加入了房间',
                leftText: '离开了房间',
                enterNick: '请输入昵称',
                notConnected: '尚未连接成功，请稍候...',
                linkCopied: '链接已复制！',
                roomPrompt: '输入房间名称:',
                roomName: '房间_',
                roomFailed: '连接失败，请检查网络'
            },
            en: {
                title: 'Free Chat Room',
                subtitle: 'Real-time chat without registration',
                info: 'Your private chat room',
                nickLabel: 'Your Nickname',
                nickPlaceholder: 'Enter nickname',
                roomLabel: 'Room Name',
                roomPlaceholder: 'Default Room',
                joinBtn: 'Join Chat',
                newRoomBtn: 'New Room',
                welcomeMsg: 'Welcome to chat!',
                onlineText: 'online',
                shareBtn: 'Share',
                sendBtn: 'Send',
                msgPlaceholder: 'Type message...',
                joinText: 'joined',
                leftText: 'left',
                enterNick: 'Enter nickname',
                notConnected: 'Not connected yet, please wait...',
                linkCopied: 'Link copied!',
                roomPrompt: 'Enter room name:',
                roomName: 'room_',
                roomFailed: 'Connection failed, please check network'
            }
        };

        let currentLang = localStorage.getItem('chatLang') || 'zh';
        let goeasy = null, user = '', room = 'default', channel = null;
        let retryCount = 0;
        const MAX_RETRIES = 3;

        // Set language
        function setLang(l) {
            currentLang = l;
            localStorage.setItem('chatLang', l);
            const t = lang[l];
            
            document.getElementById('title').textContent = t.title;
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('info').textContent = t.info;
            document.getElementById('nickLabel').textContent = t.nickLabel;
            document.getElementById('nick').placeholder = t.nickPlaceholder;
            document.getElementById('roomLabel').textContent = t.roomLabel;
            document.getElementById('room').placeholder = t.roomPlaceholder;
            document.getElementById('joinBtn').textContent = t.joinBtn;
            document.getElementById('newRoomBtn').textContent = t.newRoomBtn;
            document.getElementById('welcomeMsg').textContent = t.welcomeMsg;
            document.getElementById('onlineText').textContent = t.onlineText;
            document.getElementById('shareBtn').textContent = t.shareBtn;
            document.getElementById('sendBtn').textContent = t.sendBtn;
            document.getElementById('msg').placeholder = t.msgPlaceholder;
            document.getElementById('langBtn').textContent = l === 'zh' ? 'EN' : '中文';
        }

        function toggleLang() {
            setLang(currentLang === 'zh' ? 'en' : 'zh');
        }

        document.addEventListener('DOMContentLoaded', function() {
            setLang(currentLang);
            const p = new URLSearchParams(window.location.search);
            if (p.get('r')) document.getElementById('room').value = p.get('r');
            init();
        });

        function init() {
            setStatus('connecting', lang[currentLang].roomFailed.includes('连接') ? 'Connecting...' : 'Connecting...');
            try {
                goeasy = new GoEasy({
                    appkey: APP_KEY,
                    host: 'hangzhou.goeasy.io',
                    onProgress: function() { setStatus('connecting', 'Connecting...'); },
                    onSuccess: function() { setStatus('on', 'Connected'); retryCount = 0; },
                    onFailed: function(err) { 
                        console.error('GoEasy failed:', err);
                        retryCount++;
                        if (retryCount < MAX_RETRIES) {
                            setTimeout(init, 2000);
                        } else {
                            showError(lang[currentLang].roomFailed);
                            setStatus('off', 'Failed');
                        }
                    }
                });
            } catch(e) {
                console.error('Init error:', e);
                showError('Error: ' + e.message);
            }
        }

        function setStatus(st, txt) {
            document.getElementById('dot').className = 'dot ' + (st === 'on' ? 'on' : '');
            document.getElementById('status').textContent = txt;
        }

        function showError(txt) {
            const el = document.getElementById('error');
            el.textContent = txt;
            el.style.display = 'block';
        }

        function join() {
            const nick = document.getElementById('nick').value.trim();
            const r = document.getElementById('room').value.trim() || 'default';
            const t = lang[currentLang];
            if (!nick) { alert(t.enterNick); return; }
            if (!goeasy || !goeasy.isConnected()) { alert(t.notConnected); return; }
            user = nick; room = r;
            document.getElementById('screen').style.display = 'none';
            document.getElementById('chat').classList.add('on');
            document.getElementById('badge').textContent = room;
            sub();
            sys(user + ' ' + t.joinText);
        }

        function newRoom() {
            const t = lang[currentLang];
            const r = prompt(t.roomPrompt, t.roomName + Math.floor(Math.random() * 1000));
            if (r && r.trim()) { document.getElementById('room').value = r.trim(); join(); }
        }

        function sub() {
            if (channel) goeasy.unsubscribe({ channel: channel });
            channel = 'chat_' + room;
            goeasy.subscribe({
                channel: channel,
                onMessage: function(m) { show(JSON.parse(m.content)); }
            });
        }

        function send() {
            const i = document.getElementById('msg'), c = i.value.trim();
            if (!c) return;
            const m = { u: user, c: c, t: new Date().toLocaleTimeString(), id: Date.now() };
            goeasy.publish({ channel: channel, message: JSON.stringify(m), onSuccess: function() { show(m); i.value = ''; } });
        }

        function sys(t) {
            goeasy.publish({ channel: channel, message: JSON.stringify({ u: 'System', c: t, t: new Date().toLocaleTimeString(), id: Date.now(), s: 1 }) });
        }

        function show(m) {
            const c = document.getElementById('msgs'), d = document.createElement('div');
            d.className = 'msg' + (m.s ? ' sys' : '');
            d.innerHTML = m.s ? '<div class="msg-text">' + m.c + '</div>' : '<div class="msg-head"><span class="msg-user">' + m.u + '</span><span class="msg-time">' + m.t + '</span></div><div class="msg-text">' + m.c + '</div>';
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
        }

        function share() {
            const t = lang[currentLang];
            const u = window.location.href.split('?')[0] + '?r=' + encodeURIComponent(room);
            const text = (currentLang === 'zh' ? '来聊天室聊天吧！\n房间：' : 'Join my chat!\nRoom: ') + room + '\n' + u;
            navigator.clipboard.writeText(text).then(() => alert(t.linkCopied));
        }

        document.getElementById('msg').addEventListener('keypress', function(e) { if (e.key === 'Enter') send(); });
    </script>
</body>
</html>
