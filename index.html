<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoEasy 聊天室 - 国内可用的实时聊天</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #00d4aa;
            --bg-dark: #0a0a0a;
            --bg-card: #141414;
            --bg-hover: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --border-color: #2a2a2a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: var(--bg-card);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f39c12;
        }

        .status-dot.connected {
            background: var(--primary-color);
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        /* Welcome Screen */
        .welcome-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .welcome-screen h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .welcome-screen p {
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 16px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: var(--primary-color);
            color: var(--bg-dark);
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-hover);
        }

        /* Chat Screen */
        .chat-screen {
            display: none;
            flex: 1;
            flex-direction: column;
        }

        .chat-screen.active {
            display: flex;
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--bg-card);
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .room-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .room-badge {
            background: var(--primary-color);
            color: var(--bg-dark);
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
        }

        .online-count {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .share-btn {
            padding: 8px 16px;
            background: var(--bg-hover);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        .share-btn:hover {
            background: var(--bg-card);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: var(--bg-card);
            border-radius: 8px;
            min-height: 300px;
            max-height: 500px;
        }

        .message {
            margin-bottom: 16px;
            padding: 12px 16px;
            background: var(--bg-hover);
            border-radius: 12px;
            border-left: 3px solid var(--primary-color);
        }

        .message.system {
            border-left-color: #f39c12;
            background: rgba(243, 156, 18, 0.1);
            text-align: center;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .message-user {
            font-weight: 600;
            color: var(--primary-color);
        }

        .message-time {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .message-content {
            line-height: 1.5;
            word-break: break-word;
        }

        /* Input Area */
        .input-area {
            display: flex;
            gap: 10px;
            padding: 15px 0;
        }

        .input-area input {
            flex: 1;
            padding: 14px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 16px;
        }

        .input-area input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .input-area button {
            padding: 14px 24px;
            background: var(--primary-color);
            color: var(--bg-dark);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .input-area button:hover {
            opacity: 0.9;
        }

        /* Notice */
        .notice {
            background: rgba(0, 212, 170, 0.1);
            border: 1px solid var(--primary-color);
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--primary-color);
            text-align: center;
        }

        @media (max-width: 600px) {
            .header {
                padding: 12px 15px;
            }

            .main {
                padding: 15px;
            }

            .welcome-screen h1 {
                font-size: 24px;
            }

            .room-header {
                flex-direction: column;
                gap: 10px;
            }

            .messages-container {
                min-height: 250px;
                max-height: 350px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">💬 GoEasy 聊天室</div>
        <div class="connection-status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">连接中...</span>
        </div>
    </div>

    <div class="main">
        <!-- Welcome Screen -->
        <div class="welcome-screen" id="welcomeScreen">
            <h1>💬 GoEasy 聊天室</h1>
            <p>国内可用的实时聊天应用，无需翻墙</p>

            <div class="notice">
                ✨ 使用 GoEasy WebSocket 服务 - 永久免费
            </div>

            <div class="form-group">
                <label>您的昵称</label>
                <input type="text" id="nicknameInput" placeholder="请输入昵称" maxlength="20">
            </div>

            <div class="form-group">
                <label>房间名称</label>
                <input type="text" id="roomInput" placeholder="默认房间" value="默认房间" maxlength="30">
            </div>

            <button class="btn btn-primary" onclick="joinChat()">加入聊天</button>
            <button class="btn btn-secondary" onclick="createNewRoom()">创建新房间</button>
        </div>

        <!-- Chat Screen -->
        <div class="chat-screen" id="chatScreen">
            <div class="room-header">
                <div class="room-info">
                    <span class="room-badge" id="currentRoomBadge">默认房间</span>
                    <span class="online-count">👤 <span id="onlineCount">1</span> 人在线</span>
                </div>
                <button class="share-btn" onclick="shareRoom()">📱 分享房间</button>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div class="message system">
                    <div class="message-content">欢迎加入聊天室！</div>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="messageInput" placeholder="输入消息..." maxlength="500">
                <button onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <!-- 引入 GoEasy SDK -->
    <script src="https://cdn.goeasy.io/goeasy-2.2.1.min.js"></script>

    <script>
        // GoEasy 配置 - 使用免费的 AppKey
        // 注意：这是演示用的共享 AppKey，实际使用建议申请自己的免费 AppKey
        const GOEASY_APP_KEY = 'BCEMBERFREE';

        // 全局变量
        let goeasy = null;
        let currentUser = '';
        let currentRoom = '默认房间';
        let channel = null;

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 检查 URL 参数
            const urlParams = new URLSearchParams(window.location.search);
            const roomParam = urlParams.get('room');
            if (roomParam) {
                document.getElementById('roomInput').value = decodeURIComponent(roomParam);
            }

            // 初始化 GoEasy
            initGoEasy();
        });

        // 初始化 GoEasy
        function initGoEasy() {
            updateStatus('connecting');

            goeasy = new GoEasy({
                appkey: GOEASY_APP_KEY,
                host: 'hangzhou.goeasy.io', // 杭州节点，国内访问快
                onProgress: function(connecting) {
                    updateStatus('connecting');
                },
                onSuccess: function() {
                    updateStatus('connected');
                },
                onFailed: function(error) {
                    console.error('GoEasy 连接失败:', error);
                    updateStatus('failed');
                    alert('连接服务器失败，请刷新页面重试');
                }
            });
        }

        // 更新连接状态
        function updateStatus(status) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');

            if (status === 'connected') {
                dot.classList.add('connected');
                text.textContent = '已连接';
            } else if (status === 'connecting') {
                dot.classList.remove('connected');
                text.textContent = '连接中...';
            } else {
                dot.classList.remove('connected');
                text.textContent = '连接失败';
            }
        }

        // 加入聊天
        function joinChat() {
            const nickname = document.getElementById('nicknameInput').value.trim();
            const room = document.getElementById('roomInput').value.trim() || '默认房间';

            if (!nickname) {
                alert('请输入昵称');
                return;
            }

            if (!goeasy || !goeasy.isConnected()) {
                alert('正在连接服务器，请稍候再试');
                return;
            }

            currentUser = nickname;
            currentRoom = room;

            // 切换界面
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('chatScreen').classList.add('active');
            document.getElementById('currentRoomBadge').textContent = currentRoom;

            // 订阅频道
            subscribeChannel();

            // 添加系统消息
            sendSystemMessage(`${currentUser} 加入了房间`);
        }

        // 创建新房间
        function createNewRoom() {
            const newRoom = prompt('请输入新房间名称:', '房间_' + Math.floor(Math.random() * 10000));
            if (newRoom && newRoom.trim()) {
                document.getElementById('roomInput').value = newRoom.trim();
                joinChat();
            }
        }

        // 订阅频道
        function subscribeChannel() {
            // 取消之前的订阅（如果有）
            if (channel) {
                goeasy.unsubscribe({
                    channel: channel,
                    onSuccess: function() {
                        console.log('取消订阅成功');
                    }
                });
            }

            channel = 'chat_room_' + currentRoom;

            // 订阅频道消息
            goeasy.subscribe({
                channel: channel,
                onMessage: function(message) {
                    displayMessage(JSON.parse(message.content));
                },
                onSuccess: function() {
                    console.log('订阅成功:', channel);
                },
                onFailed: function(error) {
                    console.error('订阅失败:', error);
                }
            });
        }

        // 发送消息
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if (!content) return;

            const message = {
                type: 'user',
                id: Date.now(),
                user: currentUser,
                content: content,
                time: new Date().toLocaleTimeString()
            };

            // 发送消息到频道
            goeasy.publish({
                channel: channel,
                message: JSON.stringify(message),
                onSuccess: function() {
                    // 显示自己的消息
                    displayMessage(message);
                    input.value = '';
                },
                onFailed: function(error) {
                    console.error('发送失败:', error);
                    alert('发送失败，请重试');
                }
            });
        }

        // 发送系统消息
        function sendSystemMessage(content) {
            const message = {
                type: 'system',
                id: Date.now(),
                user: '系统',
                content: content,
                time: new Date().toLocaleTimeString()
            };

            goeasy.publish({
                channel: channel,
                message: JSON.stringify(message),
                onSuccess: function() {
                    console.log('系统消息发送成功');
                }
            });
        }

        // 显示消息
        function displayMessage(msg) {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');

            div.className = 'message' + (msg.type === 'system' ? ' system' : '');

            if (msg.type === 'system') {
                div.innerHTML = `
                    <div class="message-content">${escapeHtml(msg.content)}</div>
                `;
            } else {
                div.innerHTML = `
                    <div class="message-header">
                        <span class="message-user">👤 ${escapeHtml(msg.user)}</span>
                        <span class="message-time">${msg.time}</span>
                    </div>
                    <div class="message-content">${escapeHtml(msg.content)}</div>
                `;
            }

            container.appendChild(div);

            // 滚动到底部
            container.scrollTop = container.scrollHeight;
        }

        // 分享房间
        function shareRoom() {
            const url = window.location.href.split('?')[0] + '?room=' + encodeURIComponent(currentRoom);
            const shareText = `来聊天室聊天吧！\n房间：${currentRoom}\n链接：${url}`;

            if (navigator.share) {
                navigator.share({
                    title: '聊天室邀请',
                    text: shareText,
                    url: url
                });
            } else {
                // 复制到剪贴板
                navigator.clipboard.writeText(shareText).then(() => {
                    alert('房间链接已复制到剪贴板！');
                }).catch(() => {
                    prompt('复制以下内容分享给朋友:', shareText);
                });
            }
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 回车发送
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // 页面关闭时离开房间
        window.addEventListener('beforeunload', function() {
            if (currentUser && channel) {
                sendSystemMessage(`${currentUser} 离开了房间`);

                // 取消订阅
                goeasy.unsubscribe({
                    channel: channel
                });
            }
        });
    </script>
</body>
</html>
