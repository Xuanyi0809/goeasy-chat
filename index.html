<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P 聊天室 - 基于PeerJS</title>
    <meta name="description" content="基于PeerJS的P2P实时聊天应用，支持多人点对点通信，无需服务器">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- PeerJS -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <!-- App Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Nickname Modal -->
    <div id="nicknameModal" class="modal-overlay">
        <div class="modal-container">
            <h1 class="modal-title">进入P2P聊天室</h1>
            <p class="modal-subtitle">输入您的昵称开始点对点聊天</p>
            <input 
                type="text" 
                id="nicknameInput" 
                class="nickname-input" 
                placeholder="输入您的昵称..."
                maxlength="20"
                autocomplete="off"
                required
            >
            <button id="startChatBtn" class="start-chat-btn">开始聊天</button>
            <div id="nicknameError" class="error-message hidden">请输入有效昵称（2-20字符）</div>
            <div class="modal-footer">
                <small class="modal-info">
                    💡 P2P聊天：数据直接在用户之间传输，无需服务器存储
                </small>
            </div>
        </div>
    </div>

    <!-- Main Chat Interface -->
    <div id="chatApp" class="chat-app hidden">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-content">
                <h1 class="app-title">🔗 P2P 聊天室</h1>
                <div class="header-info">
                    <span class="peer-info">
                        ID: <code id="peerId" class="peer-id">...</code>
                        <button id="copyPeerId" class="copy-btn" title="复制Peer ID">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                        </button>
                    </span>
                    <button id="mobileUsersToggle" class="mobile-users-toggle">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="m22 21-3-3m0 0a2 2 0 1 1-2.83-2.83 2 2 0 0 1 2.83 2.83z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="chat-main">
            <!-- Connection Panel -->
            <aside class="connection-panel" id="connectionPanel">
                <div class="panel-section">
                    <h2 class="section-title">连接管理</h2>
                    
                    <!-- Current Status -->
                    <div class="status-section">
                        <div id="connectionStatus" class="connection-status">
                            <span class="status-indicator offline"></span>
                            <span class="status-text">未连接</span>
                        </div>
                    </div>

                    <!-- Room Actions -->
                    <div class="room-actions">
                        <div class="action-group">
                            <h3>创建/加入房间</h3>
                            <div class="room-input-group">
                                <input 
                                    type="text" 
                                    id="roomIdInput" 
                                    class="room-input" 
                                    placeholder="输入房间ID..."
                                    maxlength="20"
                                    autocomplete="off"
                                >
                            </div>
                            <div class="button-group">
                                <button id="createRoomBtn" class="action-btn primary">创建房间</button>
                                <button id="joinRoomBtn" class="action-btn secondary">加入房间</button>
                            </div>
                        </div>

                        <div class="room-info">
                            <small class="info-text">
                                📝 分享房间ID给其他人，他们就可以加入您的聊天房间
                            </small>
                        </div>
                    </div>
                </div>

                <!-- Online Users -->
                <div class="panel-section">
                    <h2 class="section-title">在线用户</h2>
                    <div id="usersList" class="users-list">
                        <!-- Users will be populated dynamically -->
                    </div>
                </div>
            </aside>

            <!-- Chat Area -->
            <div class="chat-area">
                <!-- Room Info -->
                <div class="room-info-header">
                    <div id="currentRoom" class="current-room">
                        <span class="room-label">当前房间：</span>
                        <span id="currentRoomId" class="room-id">未加入房间</span>
                    </div>
                </div>

                <!-- Messages Container -->
                <div class="messages-container" id="messagesContainer">
                    <div id="messagesList" class="messages-list">
                        <!-- Welcome message -->
                        <div class="welcome-message">
                            <div class="welcome-content">
                                <h3>欢迎来到P2P聊天室！</h3>
                                <p>💡 创建或加入房间开始与其他人点对点对话</p>
                                <p>🔒 所有消息通过P2P加密传输，保护隐私安全</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Message Input -->
                <div class="message-input-container">
                    <form id="messageForm" class="message-form">
                        <div class="input-wrapper">
                            <textarea 
                                id="messageInput" 
                                class="message-input" 
                                placeholder="输入消息... (Enter发送，Shift+Enter换行)"
                                rows="1"
                                maxlength="500"
                                disabled
                            ></textarea>
                            <button type="submit" class="send-btn" id="sendBtn" disabled>
                                <svg class="send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="22" y1="2" x2="11" y2="13"></line>
                                    <polygon points="22,2 15,22 11,13 2,9"></polygon>
                                </svg>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- Mobile Users Overlay -->
    <div id="mobileUsersOverlay" class="mobile-users-overlay hidden">
        <div class="mobile-users-content">
            <div class="mobile-users-header">
                <h3>用户列表</h3>
                <button id="closeMobileUsers" class="close-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="mobile-connection-panel">
                <!-- Simplified mobile connection panel -->
                <div class="status-section">
                    <div id="mobileConnectionStatus" class="connection-status">
                        <span class="status-indicator offline"></span>
                        <span class="status-text">未连接</span>
                    </div>
                </div>
                <div class="room-input-group">
                    <input 
                        type="text" 
                        id="mobileRoomIdInput" 
                        class="room-input" 
                        placeholder="房间ID..."
                        maxlength="20"
                        autocomplete="off"
                    >
                </div>
                <div class="button-group">
                    <button id="mobileCreateRoomBtn" class="action-btn primary">创建</button>
                    <button id="mobileJoinRoomBtn" class="action-btn secondary">加入</button>
                </div>
            </div>
            <div id="mobileUsersList" class="users-list">
                <!-- Mobile users will be populated here -->
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="loading-spinner">
        <div class="spinner"></div>
        <p>初始化P2P连接...</p>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- App Scripts -->
    <script src="peerjs-chat.js"></script>
</body>
</html>
